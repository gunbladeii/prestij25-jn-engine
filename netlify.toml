[build]
  publish = "frontend"

# Proxy all /api/* requests to the Render backend.
# Replace YOUR-RENDER-URL with your actual Render service URL after deploying.
# Example: https://prestij25-jn-engine.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://prestij25-jn-engine.onrender.com/api/:splat"
  status = 200
  force  = true

# PWA assets — serve directly, don't SPA-route
[[redirects]]
  from   = "/sw.js"
  to     = "/sw.js"
  status = 200

[[redirects]]
  from   = "/manifest.json"
  to     = "/manifest.json"
  status = 200

# SPA fallback — serve index.html for all non-asset routes (exclude files with extensions)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
