[build]
  publish = "frontend"

# Proxy all /api/* requests to the Render backend.
# Replace YOUR-RENDER-URL with your actual Render service URL after deploying.
# Example: https://prestij25-jn-engine.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-RENDER-URL.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — serve index.html for all non-asset routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
